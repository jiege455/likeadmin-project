name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# 添加权限配置
permissions:
  contents: write
  actions: read

# 设置环境变量使用Node24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd uniapp
        npm install
        
    - name: Build App Resources
      run: |
        cd uniapp
        npm run build:app
        
    - name: Check build output
      run: |
        echo "=== Checking build output ==="
        ls -la uniapp/dist/build/ || true
        if [ -d "uniapp/dist/build/app" ]; then
          echo "=== App directory exists ==="
          ls -la uniapp/dist/build/app/ || true
          echo "BUILD_OUTPUT=app" >> $GITHUB_ENV
        elif [ -d "uniapp/dist/build/app-plus" ]; then
          echo "=== App-plus directory exists ==="
          ls -la uniapp/dist/build/app-plus/ || true
          echo "BUILD_OUTPUT=app-plus" >> $GITHUB_ENV
        else
          echo "=== No app directory found ==="
          find uniapp/dist/build/ -type d -maxdepth 1 || true
        fi
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: app-resources
        path: |
          uniapp/dist/build/app/
          uniapp/dist/build/app-plus/
        if-no-files-found: warn
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        body: |
          自动构建的App资源文件
          构建时间: ${{ github.event.head_commit.timestamp }}
          提交信息: ${{ github.event.head_commit.message }}
        # 只上传存在的目录
        files: |
          uniapp/dist/build/app/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
