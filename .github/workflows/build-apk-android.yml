name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# 添加权限配置
permissions:
  contents: write
  actions: read

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        cd uniapp
        npm install
        
    - name: Build App Resources
      run: |
        cd uniapp
        npm run build:app
        
    - name: Check build output
      run: |
        echo "=== Checking build output ==="
        ls -la uniapp/dist/build/ || true
        if [ -d "uniapp/dist/build/app" ]; then
          echo "=== App directory exists ==="
          ls -la uniapp/dist/build/app/ || true
        elif [ -d "uniapp/dist/build/app-plus" ]; then
          echo "=== App-plus directory exists ==="
          ls -la uniapp/dist/build/app-plus/ || true
        else
          echo "=== No app directory found ==="
          find uniapp/dist/build/ -type d -maxdepth 1 || true
        fi
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: android-app-resources
        path: |
          uniapp/dist/build/app/
          uniapp/dist/build/app-plus/
        if-no-files-found: warn
        
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: apk-v${{ github.run_number }}
        name: Android Resources Release v${{ github.run_number }}
        body: |
          自动构建的Android App资源文件
          构建时间: ${{ github.event.head_commit.timestamp }}
          提交信息: ${{ github.event.head_commit.message }}
          
          注意：此资源文件需要使用HBuilderX或离线SDK打包成APK。
        files: |
          uniapp/dist/build/app/**
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
